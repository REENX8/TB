{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="mb-3">{% if account %}แก้ไขบัญชี {{ account.username }}{% else %}เพิ่มบัญชีเจ้าหน้าที่{% endif %}</h4>

    <form method="post" class="card card-body mb-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      {% if not account %}
      <div class="mb-3">
        <label class="form-label">ชื่อผู้ใช้</label>
        <input type="text" class="form-control" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">รหัสผ่าน (อย่างน้อย 8 ตัวอักษร)</label>
        <input type="password" class="form-control" name="password" minlength="8" required>
      </div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label">บทบาท</label>
        <select class="form-select" name="role">
          {% for key, label in staff_roles.items() %}
          <option value="{{ key }}" {% if account and account.role == key %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      {% if account %}
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
               {% if account.is_active %}checked{% endif %}>
        <label class="form-check-label" for="is_active">เปิดใช้งานบัญชี</label>
      </div>
      {% endif %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">บันทึก</button>
        <a class="btn btn-outline-secondary" href="{{ url_for('staff_admin.list_staff') }}">ยกเลิก</a>
      </div>
    </form>

    {% if account %}
    <form method="post" action="{{ url_for('staff_admin.reset_password', id=account.id) }}" class="card card-body">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="form-label">รีเซ็ตรหัสผ่านใหม่ (อย่างน้อย 8 ตัวอักษร)</label>
      <div class="input-group">
        <input type="password" class="form-control" name="password" minlength="8" required>
        <button type="submit" class="btn btn-warning">รีเซ็ตรหัสผ่าน</button>
      </div>
    </form>
    {% endif %}
  </div>
</div>
{% endblock %}
