{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">QR Code - {{ patient.name }}</h1>
<div class="card" style="max-width: 420px;">
  <div class="card-body text-center">
    <p>HN: <strong>{{ patient.hn }}</strong> | TB no: <strong>{{ patient.tb_no }}</strong></p>
    <img src="{{ url_for('qr_code_patient', patient_id=patient.id) }}" alt="QR Code" class="img-fluid mb-3" />
    <p class="text-muted">ใช้ QR Code นี้ใบเดียวตลอดการรักษา<br>สแกนทุกวันเพื่อยืนยันการกินยา</p>
    <a href="{{ url_for('qr_code_patient', patient_id=patient.id) }}" download="QR_{{ patient.hn }}.png" class="btn btn-outline-primary">ดาวน์โหลด QR</a>
  </div>
</div>
<a href="{{ url_for('view_patient', id=patient.id) }}" class="btn btn-secondary mt-3">กลับหน้าผู้ป่วย</a>
{% endblock %}
