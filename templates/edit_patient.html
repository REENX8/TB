{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">แก้ไขข้อมูลผู้ป่วย</h1>
<form method="post">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">ชื่อ-สกุล</label>
      <input type="text" class="form-control" name="name" value="{{ patient.name }}" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">เลขที่ HN</label>
      <input type="text" class="form-control" name="hn" value="{{ patient.hn }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">อายุ (ปี)</label>
      <input type="number" class="form-control" name="age" value="{{ patient.age }}" min="0" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">เลขที่ผู้ป่วยวัณโรค</label>
      <input type="text" class="form-control" name="tb_no" value="{{ patient.tb_no }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">ชนิดวัณโรค</label>
      <select class="form-select" name="tb_type" required>
        {% for opt in ['Pulmonary TB', 'Extrapulmonary TB', 'MDR-TB', 'Latent TB'] %}
        <option value="{{ opt }}" {% if patient.tb_type == opt %}selected{% endif %}>{{ opt }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">เบอร์โทรศัพท์</label>
      <input type="tel" class="form-control" name="phone" value="{{ patient.phone or '' }}" placeholder="เช่น 0812345678">
    </div>
  </div>
  <div class="mt-3">
    <button type="submit" class="btn btn-primary">บันทึก</button>
    <a href="{{ url_for('view_patient', id=patient.id) }}" class="btn btn-secondary">ยกเลิก</a>
  </div>
</form>
{% endblock %}
