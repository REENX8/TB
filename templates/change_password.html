{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h4 class="mb-3">เปลี่ยนรหัสผ่าน</h4>
    {% if account %}
    <form method="post" class="card card-body">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">รหัสผ่านปัจจุบัน</label>
        <input type="password" class="form-control" name="current_password" required>
      </div>
      <div class="mb-3">
        <label class="form-label">รหัสผ่านใหม่ (อย่างน้อย 8 ตัวอักษร)</label>
        <input type="password" class="form-control" name="new_password" minlength="8" required>
      </div>
      <button type="submit" class="btn btn-primary">เปลี่ยนรหัสผ่าน</button>
    </form>
    {% else %}
    <div class="alert alert-warning">
      บัญชีนี้ตั้งค่าผ่าน environment variables ของเซิร์ฟเวอร์
      ต้องเปลี่ยนรหัสผ่านที่การตั้งค่าเซิร์ฟเวอร์ (STAFF_PASS_HASH)
    </div>
    {% endif %}
  </div>
</div>
{% endblock %}
