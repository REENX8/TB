{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">แก้ไขยา — {{ patient.name }}</h1>
<p class="text-muted">วันที่: <strong>{{ dose.date.strftime('%Y-%m-%d') }}</strong></p>

<form method="post" onsubmit="return collectDrugs(this)">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card mb-3">
    <div class="card-body">
      <p class="mb-2"><strong>เลือกยาและระบุจำนวนเม็ด:</strong></p>
      <div class="drug-picker-grid">
        {% for dname, dimg in drug_images.items() %}
        {% set cur_count = dose.medications.get(dname, 0) %}
        <div class="drug-pick-card {% if cur_count %}selected{% endif %}"
             onclick="toggleDrugCard(this)" data-drug="{{ dname }}">
          <img src="{{ url_for('static', filename=dimg) }}" alt="{{ dname }}">
          <div class="drug-pick-name">{{ dname }}</div>
          <input type="number" class="drug-pick-count form-control form-control-sm"
                 step="0.5" min="0.5" placeholder="เม็ด"
                 value="{{ cur_count if cur_count else '' }}"
                 data-def="{{ cur_count if cur_count else 1 }}"
                 style="{{ '' if cur_count else 'display:none' }}"
                 onclick="event.stopPropagation()">
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">บันทึก</button>
  <a href="{{ url_for('view_patient', id=patient.id) }}" class="btn btn-secondary">ยกเลิก</a>
</form>
{% endblock %}
