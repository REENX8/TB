{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">เพิ่มผู้ป่วยใหม่</h1>
<form method="post" novalidate onsubmit="return collectDrugs(this)">
  <div class="row g-3">
    <div class="col-md-6">
      <label for="name" class="form-label">ชื่อ-สกุล</label>
      <input type="text" class="form-control" id="name" name="name" required />
    </div>
    <div class="col-md-6">
      <label for="hn" class="form-label">เลขที่ HN</label>
      <input type="text" class="form-control" id="hn" name="hn" required />
    </div>
    <div class="col-md-4">
      <label for="age" class="form-label">อายุ (ปี)</label>
      <input type="number" class="form-control" id="age" name="age" min="0" required />
    </div>
    <div class="col-md-4">
      <label for="weight" class="form-label">น้ำหนัก (kg)</label>
      <input type="number" step="0.1" class="form-control" id="weight" name="weight" min="0" required />
    </div>
    <div class="col-md-4">
      <label for="tb_no" class="form-label">เลขที่ผู้ป่วยวัณโรค</label>
      <input type="text" class="form-control" id="tb_no" name="tb_no" required />
    </div>
    <div class="col-md-6">
      <label for="tb_type" class="form-label">ชนิดวัณโรค</label>
      <select class="form-select" id="tb_type" name="tb_type" required>
        <option value="">-- เลือก --</option>
        <option value="Pulmonary TB">Pulmonary TB (วัณโรคปอด)</option>
        <option value="Extrapulmonary TB">Extrapulmonary TB (วัณโรคนอกปอด)</option>
        <option value="MDR-TB">MDR-TB (วัณโรคดื้อยา)</option>
        <option value="Latent TB">Latent TB (วัณโรคแฝง)</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
      <input type="tel" class="form-control" id="phone" name="phone" placeholder="เช่น 0812345678" />
    </div>
    <div class="col-md-6">
      <label for="start_date" class="form-label">วันเริ่มรักษา</label>
      <input type="date" class="form-control" id="start_date" name="start_date" value="{{ today_th().strftime('%Y-%m-%d') }}" required />
    </div>
    <div class="col-md-6">
      <label for="days_of_medication" class="form-label">จำนวนวันที่ต้องกินยา</label>
      <input type="number" class="form-control" id="days_of_medication" name="days_of_medication" value="180" min="1" />
      <div class="form-text">ค่าเริ่มต้น 180 วัน (6 เดือน)</div>
    </div>
  </div>

  {# Custom regimen toggle #}
  <div class="card mt-4">
    <div class="card-body">
      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="custom_regimen" name="custom_regimen" onchange="toggleCustom()">
        <label class="form-check-label" for="custom_regimen">
          <strong>กำหนดยาเอง</strong> (สำหรับผู้ป่วยแพ้ยา / ปรับสูตรยา)
        </label>
      </div>
      <div id="custom_section" style="display:none;">
        <p class="text-muted mb-2">เลือกยาและระบุจำนวนเม็ดต่อวัน:</p>
        <div class="drug-picker-grid">
          {% for dname, dimg in drug_images.items() %}
          <div class="drug-pick-card" onclick="toggleDrugCard(this)" data-drug="{{ dname }}">
            <img src="{{ url_for('static', filename=dimg) }}" alt="{{ dname }}">
            <div class="drug-pick-name">{{ dname }}</div>
            <input type="number" class="drug-pick-count form-control form-control-sm"
                   step="0.5" min="0.5" placeholder="เม็ด" data-def="1"
                   style="display:none" onclick="event.stopPropagation()">
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary">บันทึก</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">ยกเลิก</a>
  </div>
</form>

<script>
function toggleCustom() {
  document.getElementById('custom_section').style.display =
    document.getElementById('custom_regimen').checked ? 'block' : 'none';
}
</script>
{% endblock %}
