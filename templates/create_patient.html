{% extends 'base.html' %}
{% block content %}
<h1 class="h3 mb-3">เพิ่มผู้ป่วยใหม่</h1>
<form method="post" novalidate>
  <div class="row g-3">
    <div class="col-md-6">
      <label for="name" class="form-label">ชื่อ-สกุล</label>
      <input type="text" class="form-control" id="name" name="name" required />
    </div>
    <div class="col-md-6">
      <label for="hn" class="form-label">เลขที่ HN</label>
      <input type="text" class="form-control" id="hn" name="hn" required />
    </div>
    <div class="col-md-4">
      <label for="age" class="form-label">อายุ (ปี)</label>
      <input type="number" class="form-control" id="age" name="age" min="0" required />
    </div>
    <div class="col-md-4">
      <label for="weight" class="form-label">น้ำหนัก (kg)</label>
      <input type="number" step="0.1" class="form-control" id="weight" name="weight" min="0" required />
    </div>
    <div class="col-md-4">
      <label for="tb_no" class="form-label">เลขที่ผู้ป่วยวัณโรค</label>
      <input type="text" class="form-control" id="tb_no" name="tb_no" required />
    </div>
    <div class="col-md-6">
      <label for="tb_type" class="form-label">ชนิดวัณโรค</label>
      <select class="form-select" id="tb_type" name="tb_type" required>
        <option value="">-- เลือก --</option>
        <option value="Pulmonary TB">Pulmonary TB (วัณโรคปอด)</option>
        <option value="Extrapulmonary TB">Extrapulmonary TB (วัณโรคนอกปอด)</option>
        <option value="MDR-TB">MDR-TB (วัณโรคดื้อยา)</option>
        <option value="Latent TB">Latent TB (วัณโรคแฝง)</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="start_date" class="form-label">วันเริ่มรักษา</label>
      <input type="date" class="form-control" id="start_date" name="start_date" value="{{ date.today().strftime('%Y-%m-%d') }}" required />
    </div>
    <div class="col-md-6">
      <label for="days_of_medication" class="form-label">จำนวนวันที่ต้องกินยา</label>
      <input type="number" class="form-control" id="days_of_medication" name="days_of_medication" value="180" min="1" />
      <div class="form-text">ค่าเริ่มต้น 180 วัน (6 เดือน)</div>
    </div>
  </div>

  {# Custom regimen toggle #}
  <div class="card mt-4">
    <div class="card-body">
      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="custom_regimen" name="custom_regimen" onchange="toggleCustom()">
        <label class="form-check-label" for="custom_regimen">
          <strong>กำหนดยาเอง</strong> (สำหรับผู้ป่วยแพ้ยา / ปรับสูตรยา)
        </label>
      </div>
      <div id="custom_section" style="display:none;">
        <p class="text-muted mb-2">เภสัชกรระบุชื่อยาและจำนวนเม็ดต่อวัน:</p>
        <div id="drug_rows">
          <div class="row g-2 mb-2 drug-row">
            <div class="col-7">
              <input type="text" class="form-control form-control-sm" name="drug_name" placeholder="ชื่อยา เช่น INH 100mg" />
            </div>
            <div class="col-3">
              <input type="number" class="form-control form-control-sm" name="drug_count" placeholder="เม็ด" min="1" />
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.drug-row').remove()">X</button>
            </div>
          </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="addDrugRow()">+ เพิ่มรายการยา</button>
      </div>
    </div>
  </div>

  <div class="mt-3">
    <button type="submit" class="btn btn-primary">บันทึก</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">ยกเลิก</a>
  </div>
</form>

<script>
function toggleCustom() {
  const sec = document.getElementById('custom_section');
  sec.style.display = document.getElementById('custom_regimen').checked ? 'block' : 'none';
}
function addDrugRow() {
  const row = document.createElement('div');
  row.className = 'row g-2 mb-2 drug-row';
  row.innerHTML = `
    <div class="col-7"><input type="text" class="form-control form-control-sm" name="drug_name" placeholder="ชื่อยา เช่น Rifampicin 300mg" /></div>
    <div class="col-3"><input type="number" class="form-control form-control-sm" name="drug_count" placeholder="เม็ด" min="1" /></div>
    <div class="col-2"><button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('.drug-row').remove()">X</button></div>
  `;
  document.getElementById('drug_rows').appendChild(row);
}
</script>
{% endblock %}
