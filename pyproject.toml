[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "E712", "B904", "B905", "SIM105"]

[tool.ruff.lint.per-file-ignores]
"migrations/*" = ["E", "F", "I", "UP", "B", "SIM"]
"tests/*" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
source = ["tb"]
omit = ["tb/__init__.py", "tests/*"]
