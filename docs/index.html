<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TB Tracker — Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <style>
    body { padding-bottom: 60px; }
    .badge-adherence-high { background-color: #198754; }
    .badge-adherence-mid  { background-color: #ffc107; color:#000; }
    .badge-adherence-low  { background-color: #dc3545; }
    .demo-banner { background: linear-gradient(90deg,#0d6efd,#6610f2); color:#fff; text-align:center; padding:6px; font-size:.85rem; letter-spacing:.05em; }
  </style>
</head>
<body>
<div class="demo-banner">&#127774; DEMO MODE — ข้อมูลจำลอง ไม่ใช่ข้อมูลจริง</div>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">TB Tracker</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">ผู้ป่วย</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="report.html">รายงาน</a></li>
        <li class="nav-item"><a class="nav-link" href="audit.html">Audit Log</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item"><span class="nav-link text-light opacity-75">demo</span></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">รายชื่อผู้ป่วย</h1>
    <button class="btn btn-primary" onclick="alert('Demo: ฟีเจอร์นี้ใช้งานได้ในระบบจริง')">+ เพิ่มผู้ป่วย</button>
  </div>

  <div class="mb-3">
    <input type="search" id="search" class="form-control" placeholder="ค้นหาชื่อหรือ HN..."
           oninput="filterRows(this.value)">
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle">
      <thead>
        <tr>
          <th>ID</th><th>ชื่อ</th><th>HN</th><th>น้ำหนัก (kg)</th>
          <th>วันเริ่ม</th><th>ความสม่ำเสมอ</th><th>ยาวันนี้</th><th></th>
        </tr>
      </thead>
      <tbody id="patient-tbody"></tbody>
    </table>
  </div>

  <details class="mt-4" id="archived-section" style="display:none;">
    <summary class="text-muted" style="cursor:pointer;">
      <strong>ประวัติผู้ป่วยที่เก็บไว้ (<span id="archived-count">0</span> ราย)</strong>
    </summary>
    <div class="table-responsive mt-2">
      <table class="table table-sm table-bordered align-middle">
        <thead class="table-secondary">
          <tr><th>ID</th><th>ชื่อ</th><th>HN</th><th>วันเริ่ม</th><th></th></tr>
        </thead>
        <tbody id="archived-tbody"></tbody>
      </table>
    </div>
  </details>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="demo-data.js"></script>
<script>
function adherenceBadge(pct, total) {
  if (total === 0) return '<span class="badge bg-secondary">ไม่มีข้อมูล</span>';
  const cls = pct >= 90 ? 'badge-adherence-high' : pct >= 70 ? 'badge-adherence-mid' : 'badge-adherence-low';
  return `<span class="badge ${cls}">${pct}%</span>`;
}
function todayBadge(dose) {
  if (!dose) return '<span class="text-muted">-</span>';
  return dose.taken
    ? '<span class="badge bg-success">กินแล้ว</span>'
    : '<span class="badge bg-warning text-dark">ยังไม่กิน</span>';
}
function outcomeBadge(oc) {
  if (!oc) return '';
  const cls = ['cured','completed'].includes(oc) ? 'bg-success' : ['failed','defaulted','died'].includes(oc) ? 'bg-danger' : 'bg-secondary';
  const lbl = {'cured':'หาย','completed':'รักษาครบ','failed':'ไม่สำเร็จ','defaulted':'ขาดยา','died':'เสียชีวิต','transferred_out':'ส่งต่อ'}[oc]||oc;
  return `<br><small class="badge mt-1 ${cls}">${lbl}</small>`;
}

const active = PATIENTS.filter(p => !p.archived);
const archived = PATIENTS.filter(p => p.archived);

const tbody = document.getElementById('patient-tbody');
active.forEach(p => {
  const stats = getStats(p);
  const td = getTodayDose(p);
  const rowClass = stats.adherence_pct < 70 ? 'table-danger' : stats.adherence_pct < 90 ? 'table-warning' : '';
  tbody.innerHTML += `
  <tr class="${rowClass}" data-search="${(p.name + ' ' + p.hn).toLowerCase()}">
    <td>${p.id}</td>
    <td>${p.name}</td>
    <td>${p.hn}</td>
    <td>${p.weight}</td>
    <td>${p.start_date.toLocaleDateString('th-TH')}</td>
    <td>${adherenceBadge(stats.adherence_pct, stats.total_past)}
      ${stats.overdue > 0 ? `<small class="text-danger ms-1">ค้าง ${stats.overdue} วัน</small>` : ''}
    </td>
    <td>${todayBadge(td)}${outcomeBadge(p.outcome)}</td>
    <td><a href="patient.html?id=${p.id}" class="btn btn-sm btn-outline-primary">ดู</a></td>
  </tr>`;
});

if (archived.length > 0) {
  document.getElementById('archived-section').style.display = '';
  document.getElementById('archived-count').textContent = archived.length;
  const at = document.getElementById('archived-tbody');
  archived.forEach(p => {
    at.innerHTML += `
    <tr class="text-muted">
      <td>${p.id}</td><td>${p.name}</td><td>${p.hn}</td>
      <td>${p.start_date.toLocaleDateString('th-TH')}</td>
      <td><a href="patient.html?id=${p.id}" class="btn btn-sm btn-outline-secondary">ดู</a></td>
    </tr>`;
  });
}

function filterRows(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#patient-tbody tr').forEach(r => {
    r.style.display = (r.dataset.search||'').includes(q) ? '' : 'none';
  });
}
</script>
</body>
</html>
